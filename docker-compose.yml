version: "3.9"

services:
  db:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: office_lunch_db
      POSTGRES_USER: lunch_user
      POSTGRES_PASSWORD: lunch_pass
    volumes:
      - pgdata:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U lunch_user -d office_lunch_db"]
      interval: 5s
      timeout: 5s
      retries: 10

  backend:
    build: ./backend
    restart: unless-stopped
    command: >
      sh -c "python manage.py migrate &&
             python manage.py collectstatic --noinput &&
             gunicorn config.wsgi:application --bind 0.0.0.0:8000 --workers 3"
    environment:
      DJANGO_SECRET_KEY: change-this-to-a-long-random-secret-in-production
      DEBUG: "False"
      ALLOWED_HOSTS: localhost,127.0.0.1,backend
      DATABASE_URL: postgres://lunch_user:lunch_pass@db:5432/office_lunch_db
      CORS_ALLOWED_ORIGINS: http://localhost:5173,http://localhost:3000
      TIME_ZONE: Asia/Kolkata
      COMPANY_UPI_ID: officecanteen@upi
      ORDER_CUTOFF_HOUR: "11"
    volumes:
      - media_data:/app/media
    ports:
      - "8000:8000"
    depends_on:
      db:
        condition: service_healthy

  frontend:
    build: ./frontend
    restart: unless-stopped
    environment:
      VITE_API_BASE_URL: http://localhost:8000/api
    ports:
      - "5173:5173"
    depends_on:
      - backend

volumes:
  pgdata:
  media_data:
